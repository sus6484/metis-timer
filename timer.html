<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="dark" />
    <title>Metis — 타이머</title>
    <link rel="stylesheet" href="styles.css?v=20260620" />
    <style>
      :root {
        color-scheme: dark;
        --bg: #000;
        --pink: #ccff00;
        --cyan: #38bdf8;
        --text: #fff;
        --muted: #94a3b8;
        /* 전체화면·와이드에서 좌우 패널을 화면 끝 쪽으로 활용 */
        --timer-layout-max: min(2560px, 99vw);
      }
      * {
        box-sizing: border-box;
      }
      html {
        overflow-x: hidden;
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
        touch-action: manipulation;
      }
      html,
      body {
        height: 100%;
        margin: 0;
        max-width: 100%;
      }
      body {
        min-height: 100vh;
        min-height: 100dvh;
        min-height: -webkit-fill-available;
        background-color: var(--bg);
        background-image: url("image/background2.png");
        background-repeat: no-repeat;
        background-position: center center;
        background-size: cover;
        color: var(--text);
        font-family: Pretendard, system-ui, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: max(12px, env(safe-area-inset-top, 0px)) max(4px, env(safe-area-inset-right, 0px))
          max(20px, env(safe-area-inset-bottom, 0px)) max(2px, env(safe-area-inset-left, 0px));
        position: relative;
        overflow-x: hidden;
        overflow-y: hidden;
        width: 100%;
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.8);
        pointer-events: none;
        z-index: 0;
      }
      body > * {
        position: relative;
        z-index: 1;
      }
      .timer-page-header {
        width: 100%;
        max-width: min(99vw, var(--timer-layout-max));
        margin: 0 auto 10px;
        padding: 0 8px 4px;
        text-align: center;
        flex-shrink: 0;
      }
      .timer-tournament-title {
        margin: 0;
        color: var(--pink);
        text-shadow: 0 0 8px rgba(204, 255, 0, 0.45), 0 0 20px rgba(204, 255, 0, 0.25);
        font-size: clamp(1.5rem, 5.2vw, 2.85rem);
        font-weight: 800;
        line-height: 1.2;
        letter-spacing: -0.02em;
        white-space: pre-wrap;
        text-align: center;
        word-break: keep-all;
        overflow-wrap: anywhere;
      }
      .timer-header-logo {
        width: min(120px, 26vw);
        max-width: 100%;
        height: auto;
        display: block;
        margin: 6px auto 14px;
        opacity: 0.82;
      }
      .outer-layout {
        flex: 1;
        display: flex;
        flex-direction: row;
        align-items: stretch;
        justify-content: space-between;
        width: min(99vw, var(--timer-layout-max));
        max-width: min(99vw, var(--timer-layout-max));
        gap: clamp(10px, 2vw, 28px);
        flex-wrap: wrap;
        margin: 0 auto;
        min-height: 0;
        overflow: hidden;
      }
      .stage-left {
        flex: 0 1 320px;
        min-width: 240px;
        max-width: 380px;
        min-height: 0;
        padding: 6px clamp(10px, 1.3vw, 16px) 8px clamp(18px, 2.9vw, 34px);
        border-right: 1px solid rgba(255, 255, 255, 0.12);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-self: stretch;
        text-align: left;
        overflow: hidden;
      }
      .left-carousel {
        flex: 1 1 auto;
        min-height: 0;
        width: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 18px;
        overflow: hidden;
      }
      .left-carousel.is-rotating {
        position: relative;
        justify-content: flex-start;
        gap: 0;
      }
      .left-carousel.is-rotating .left-panel-block {
        display: none;
      }
      .left-carousel.is-rotating.is-view-meta {
        justify-content: center;
        gap: 18px;
      }
      .left-carousel.is-rotating.is-view-meta .left-panel-block--info,
      .left-carousel.is-rotating.is-view-meta .left-panel-block--total {
        display: block;
      }
      .left-carousel.is-rotating.is-view-prize .left-panel-block--prize {
        display: flex;
        flex: 1 1 auto;
        min-height: 0;
        flex-direction: column;
      }
      .left-carousel.is-rotating.is-view-prize .prize-wrap {
        flex: 1 1 auto;
        min-height: 0;
        display: flex;
        flex-direction: column;
      }
      .left-carousel.is-rotating.is-view-prize .prize-val {
        flex: 1 1 auto;
        min-height: 0;
        overflow-x: hidden;
        overflow-y: auto;
        scrollbar-width: thin;
        scrollbar-color: rgba(255, 255, 255, 0.22) transparent;
      }
      .left-carousel.is-rotating.is-view-prize .prize-val::-webkit-scrollbar {
        width: 4px;
      }
      .left-carousel.is-rotating.is-view-prize .prize-val::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.22);
        border-radius: 4px;
      }
      .info-wrap,
      .prize-wrap,
      .total-prize-wrap {
        margin: 0;
      }
      .left-lab {
        display: block;
        font-size: 1.44rem;
        letter-spacing: 0.2304rem;
        color: var(--pink);
        font-weight: 700;
        margin-bottom: 8px;
      }
      .total-prize-value {
        --ls: var(--prize-font-scale, var(--left-font-scale, 1));
        margin: 0;
        color: var(--pink);
        font-size: calc(clamp(1.1rem, 3.4vw, 1.85rem) * var(--ls));
        font-weight: 800;
        line-height: 1.2;
        font-variant-numeric: tabular-nums;
        text-shadow: 0 0 8px rgba(204, 255, 0, 0.35);
        word-break: break-word;
      }
      .left-lab-margin {
        margin-top: 18px;
      }
      .prize-val {
        --ls: var(--prize-font-scale, var(--left-font-scale, 1));
        display: flex;
        flex-direction: column;
        gap: 6px;
        max-height: none;
        overflow: hidden;
        padding-right: 0;
        font-size: calc(1rem * var(--ls));
        line-height: 1.35;
        color: var(--text);
      }
      .prize-item {
        display: flex;
        align-items: baseline;
        justify-content: flex-start;
        gap: 10px;
        white-space: normal;
        word-break: break-word;
      }
      .prize-rank {
        color: #e5e7eb;
        font-weight: 700;
        font-size: calc(clamp(0.95rem, 2.1vw, 1.15rem) * var(--ls));
        letter-spacing: 0.02em;
      }
      .prize-amount {
        color: #ffffff;
        font-weight: 700;
        font-size: calc(clamp(1rem, 2.3vw, 1.22rem) * var(--ls));
        font-variant-numeric: tabular-nums;
        margin-left: auto;
      }
      .prize-item--top .prize-rank {
        color: var(--pink);
        font-size: calc(clamp(1.08rem, 2.7vw, 1.4rem) * var(--ls));
      }
      .prize-item--top .prize-amount {
        color: #f5ffd1;
        font-size: calc(clamp(1.2rem, 3.1vw, 1.75rem) * var(--ls));
        text-shadow: 0 0 8px rgba(204, 255, 0, 0.28);
      }
      .tourney-info {
        --ls: var(--info-font-scale, var(--left-font-scale, 1));
        margin: 0;
        font-size: calc(clamp(1.2rem, 3.1vw, 1.75rem) * var(--ls));
        line-height: 1.45;
        font-weight: 700;
        color: #f5ffd1;
        text-shadow: 0 0 8px rgba(204, 255, 0, 0.28);
        white-space: pre-wrap;
        word-break: break-word;
      }
      .tap-root {
        flex: 1 1 0%;
        min-width: 0;
        display: flex;
        flex-direction: column;
        align-items: stretch;
        justify-content: center;
        cursor: pointer;
        border-radius: 12px;
        outline: none;
        transition: background 0.15s;
        padding: 8px 0;
      }
      .tap-root:hover {
        background: rgba(255, 45, 165, 0.04);
      }
      .tap-root:focus-visible {
        box-shadow: 0 0 0 2px var(--pink);
      }
      .tap-inner {
        flex: 1 1 auto;
        display: flex;
        flex-direction: row;
        align-items: stretch;
        justify-content: space-between;
        gap: clamp(12px, 2.5vw, 36px);
        width: 100%;
        min-height: 0;
        flex-wrap: nowrap;
      }
      .stage-main {
        flex: 1 1 0%;
        min-width: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
      }
      .normal-stage-main {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
        text-align: center;
      }
      .stage-side {
        flex: 0 0 290px;
        min-width: 250px;
        border-left: 1px solid rgba(255, 255, 255, 0.12);
        padding-left: clamp(18px, 2.9vw, 34px);
        padding-right: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 22px;
        text-align: left;
      }
      @media (max-width: 900px) {
        body {
          overflow-y: auto;
        }
        .tap-inner {
          flex-wrap: wrap;
        }
        .outer-layout {
          flex-direction: column;
          align-items: stretch;
          overflow: visible;
        }
        .stage-left {
          max-width: none;
          min-height: 160px;
          max-height: min(36vh, 320px);
          border-right: none;
          border-bottom: 1px solid rgba(255, 255, 255, 0.12);
          padding: 0 0 18px 0;
          justify-content: flex-start;
          align-self: auto;
        }
        .tap-inner {
          flex-direction: column;
          align-items: center;
          justify-content: flex-start;
        }
        .stage-side {
          border-left: none;
          border-top: 1px solid rgba(255, 255, 255, 0.12);
          padding-left: 0;
          padding-top: 20px;
          width: 100%;
          max-width: 420px;
          flex-direction: column;
          align-items: stretch;
          gap: 20px;
        }
      }
      @media (max-width: 640px) {
        body {
          padding:
            max(8px, env(safe-area-inset-top, 0px))
            max(6px, env(safe-area-inset-right, 0px))
            max(96px, env(safe-area-inset-bottom, 0px))
            max(6px, env(safe-area-inset-left, 0px));
          overflow-y: auto;
        }
        .timer-page-header {
          margin-bottom: 6px;
          padding: 0 4px 2px;
        }
        .timer-tournament-title {
          font-size: clamp(1rem, 6vw, 1.45rem);
        }
        .outer-layout {
          width: 100%;
          max-width: 100%;
          gap: 8px;
          overflow: visible;
        }
        .stage-left {
          display: none;
        }
        .tap-root {
          order: 1;
          width: 100%;
          flex: 0 0 auto;
        }
        .tap-inner {
          gap: 10px;
        }
        .stage-main {
          width: 100%;
        }
        .normal-stage-main {
          padding: 4px 2px 0;
        }
        .timer-header-logo {
          width: min(54px, 18vw);
          margin: 0 auto 6px;
        }
        .status-pill {
          font-size: 0.68rem;
          margin-bottom: 2px;
        }
        .level {
          font-size: clamp(0.9rem, 4.5vw, 1.2rem);
          margin-bottom: 8px;
          letter-spacing: 0.04em;
        }
        .clock {
          font-size: clamp(2.5rem, 16vw, 4.2rem);
          margin-bottom: 8px;
        }
        .blinds {
          font-size: clamp(0.88rem, 4.3vw, 1.2rem);
          margin-bottom: 8px;
          line-height: 1.22;
        }
        .blinds span.lab {
          display: block;
          margin-right: 0;
          margin-bottom: 2px;
          font-size: 0.64rem;
          letter-spacing: 0.05em;
        }
        .next-level {
          font-size: clamp(0.78rem, 3.5vw, 0.96rem);
          line-height: 1.22;
          margin-top: 4px;
          padding-inline: 0;
        }
        .tap-hint {
          font-size: 0.56rem;
          margin-top: 8px;
        }
        .stage-side {
          order: 2;
          width: 100%;
          max-width: none;
          display: grid;
          grid-template-columns: repeat(2, minmax(0, 1fr));
          gap: 8px;
          padding-top: 8px;
        }
        .metric {
          min-width: 0;
          padding: 6px 4px;
          border-radius: 8px;
          background: rgba(255, 255, 255, 0.04);
        }
        .metric-label {
          font-size: 0.56rem;
          margin-bottom: 4px;
        }
        .metric-val--sidebar {
          font-size: 0.88rem;
          line-height: 1.12;
          word-break: break-word;
        }
        .quick-panel {
          left: 50%;
          right: auto;
          bottom: max(8px, env(safe-area-inset-bottom, 0px));
          transform: translateX(-50%);
          width: min(98vw, 430px);
          max-width: 98vw;
          gap: 4px;
          padding: 6px 8px;
        }
        .quick-panel-group {
          gap: 3px;
          padding: 3px 4px;
        }
        .quick-panel-label {
          font-size: 0.54rem;
        }
        .quick-btn {
          min-width: 28px;
          height: 28px;
          font-size: 0.82rem;
        }
        .quick-btn--start,
        .quick-btn--pause,
        .quick-btn--end {
          min-width: 48px;
        }
      }
      @supports not (backdrop-filter: blur(1px)) {
        .timer-pause-overlay {
          backdrop-filter: none;
          -webkit-backdrop-filter: none;
          background: rgba(50, 0, 0, 0.55);
        }
      }
      .tap-hint {
        box-sizing: border-box;
        width: 100%;
        max-width: min(36rem, 100%);
        margin-inline: auto;
        font-size: 0.72rem;
        color: #64748b;
        margin-top: 16px;
        letter-spacing: 0.04em;
        text-align: center;
      }
      .status-pill {
        width: 100%;
        margin-inline: 0;
        text-align: center;
        font-size: 0.92rem;
        color: var(--muted);
        margin-bottom: 8px;
        letter-spacing: 0.06em;
      }
      .level {
        width: 100%;
        margin-inline: 0;
        text-align: center;
        color: var(--pink);
        font-size: clamp(1.45rem, 3.7vw, 2.2rem);
        font-weight: 800;
        letter-spacing: 0.12em;
        margin-bottom: 20px;
      }
      .clock {
        font-size: clamp(6.25rem, min(28vw, 26vmin), 15.5rem);
        font-weight: 800;
        font-variant-numeric: tabular-nums;
        margin-bottom: 28px;
        line-height: 1;
        text-align: center;
      }
      .blinds {
        width: 100%;
        text-align: center;
        margin-bottom: 20px;
        font-size: clamp(2.1rem, 5.4vw, 3.1rem);
        font-weight: 700;
        line-height: 1.35;
      }
      .blinds span.lab {
        color: var(--pink);
        font-size: clamp(1.05rem, 2.2vw, 1.45rem);
        letter-spacing: 0.1em;
        margin-right: 8px;
      }
      .next-level {
        box-sizing: border-box;
        width: 100%;
        max-width: min(52rem, 100%);
        padding-inline: 8px;
        margin-inline: auto;
        text-align: center;
        font-size: clamp(1.8rem, 4.6vw, 2.5rem);
        font-weight: 600;
        color: var(--muted);
        margin-top: 12px;
        line-height: 1.4;
      }
      .next-level strong {
        color: var(--cyan);
      }
      .break-top-bar {
        width: 100%;
        max-width: var(--timer-layout-max);
        margin: 0 auto 10px;
        padding: 12px 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 14px 24px;
        flex-wrap: wrap;
        background: rgba(180, 83, 79, 0.18);
        border: 1px solid rgba(180, 83, 79, 0.45);
        border-radius: 12px;
        flex-shrink: 0;
      }
      .break-top-bar.is-hidden {
        display: none;
      }
      .break-top-meta {
        font-size: 0.8rem;
        letter-spacing: 0.14em;
        color: #f87171;
        font-weight: 700;
      }
      .break-top-clock {
        font-size: clamp(2rem, 7vw, 3.5rem);
        font-weight: 800;
        font-variant-numeric: tabular-nums;
        color: var(--cyan);
        line-height: 1;
      }
      .break-video-stage {
        box-sizing: border-box;
        width: 100%;
        max-width: 100%;
        min-width: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: min(52vh, 520px);
        padding: 8px 4px;
      }
      .break-video-stage.is-hidden {
        display: none;
      }
      .break-video-stage video {
        box-sizing: border-box;
        width: auto;
        height: auto;
        max-width: 100%;
        min-width: 0;
        max-height: min(68vh, 720px);
        object-fit: contain;
        border-radius: 10px;
        background: #0a0a0a;
        box-shadow: 0 8px 40px rgba(0, 0, 0, 0.55);
      }
      .normal-stage-main.is-hidden {
        display: none;
      }
      .metric-label {
        display: block;
        font-size: 0.75rem;
        letter-spacing: 0.14em;
        color: var(--pink);
        margin-bottom: 6px;
      }
      .metric-val {
        font-size: clamp(2.2rem, 6.5vw, 3.6rem);
        font-weight: 800;
        font-variant-numeric: tabular-nums;
        color: var(--text);
      }
      .metric-val--sidebar {
        font-size: clamp(1.35rem, 4vw, 2.35rem);
        font-weight: 800;
        font-variant-numeric: tabular-nums;
        color: #d4d4d8;
        letter-spacing: 0.02em;
      }
      .metric-val--avgbb {
        line-height: 1.35;
        white-space: normal;
      }
      .metric-val-bb {
        color: var(--pink);
        text-shadow: 0 0 8px rgba(204, 255, 0, 0.28);
        font-size: 0.88em;
      }
      .metric-val--mono {
        font-family: ui-monospace, "Cascadia Code", Consolas, monospace;
      }
      .metric-val--placeholder {
        opacity: 0.4;
      }
      .metric-label--break {
        color: #b45353;
      }
      .quick-zone {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        height: 92px;
        z-index: 99999 !important;
        pointer-events: none;
      }
      .quick-panel {
        position: fixed;
        left: 50%;
        bottom: max(8px, env(safe-area-inset-bottom, 0px));
        transform: translate(-50%, 52%);
        transition: transform 0.22s ease, opacity 0.22s ease;
        opacity: 0.56;
        background: rgba(0, 0, 0, 0.72);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 12px;
        padding: 8px 10px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: center;
        max-width: min(97vw, 1120px);
        width: max-content;
        z-index: 99999 !important;
        pointer-events: auto;
      }
      .quick-panel.is-visible {
        transform: translate(-50%, 0);
        opacity: 1;
      }
      .quick-panel-group {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 8px;
        padding: 4px 6px;
      }
      .quick-panel-label {
        font-size: 0.68rem;
        letter-spacing: 0.06em;
        color: #cbd5e1;
        margin-right: 2px;
        white-space: nowrap;
      }
      .quick-btn {
        min-width: 30px;
        height: 28px;
        border-radius: 6px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        background: #1f2937;
        color: #f8fafc;
        font-weight: 700;
        font-size: 0.92rem;
        line-height: 1;
        cursor: pointer;
      }
      .quick-btn:hover {
        filter: brightness(1.1);
      }
      .quick-btn:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      .quick-panel-group--transport {
        flex-wrap: nowrap;
        gap: 6px;
        padding-left: 8px;
        padding-right: 8px;
      }
      .quick-btn--start {
        background: #16a34a;
        min-width: 58px;
      }
      /* 관리자 일시정지(.btn-timer-action.gray)와 동일 톤 */
      .quick-btn--pause {
        background: #4b4b5a;
        color: #f0f0f5;
        border-color: rgba(255, 255, 255, 0.22);
        min-width: 58px;
      }
      .quick-btn--end {
        background: #dc2626;
        min-width: 58px;
      }
      .cloud-sync-badge {
        position: fixed;
        top: max(10px, env(safe-area-inset-top, 0px));
        right: max(10px, env(safe-area-inset-right, 0px));
        z-index: 60;
        pointer-events: none;
        backdrop-filter: blur(6px);
        background: rgba(0, 0, 0, 0.55);
      }
    </style>
  </head>
  <body>
    <div
      id="cloud-sync-badge"
      class="cloud-sync-badge"
      data-state="idle"
      aria-live="polite"
      title="클라우드 동기화"
    >
      <span class="cloud-sync-dot" aria-hidden="true"></span>
      <span class="cloud-sync-label">대기</span>
    </div>
    <div id="pause-overlay" class="timer-pause-overlay" aria-hidden="true">
      <div class="timer-pause-overlay-label" aria-live="polite">Ⅱ PAUSED</div>
    </div>
    <div id="break-top-bar" class="break-top-bar is-hidden" aria-live="polite">
      <span class="break-top-meta">쉬는 시간 · 남은 시간</span>
      <span id="break-remaining-top" class="break-top-clock">00:00</span>
    </div>
    <header class="timer-page-header">

    <script>
      (function () {
        function resolveFallbackId() {
          try {
            var raw = localStorage.getItem("metis_blindPresets");
            if (raw) {
              var arr = JSON.parse(raw);
              if (Array.isArray(arr) && arr.length) {
                var aid = localStorage.getItem("metis_activePresetId");
                if (
                  aid &&
                  arr.some(function (p) {
                    return p && p.id === aid;
                  })
                ) {
                  return aid;
                }
                return arr[0].id;
              }
            }
          } catch (e) {}
          return "preset_default";
        }
        function resolvePresetId() {
          var params = new URLSearchParams(window.location.search);
          var id = params.get("id");
          if (id) {
            try {
              var raw2 = localStorage.getItem("metis_blindPresets");
              if (raw2) {
                var arr2 = JSON.parse(raw2);
                var known =
                  Array.isArray(arr2) &&
                  arr2.some(function (p) {
                    return p && p.id === id;
                  });
                if (!known) id = null;
              }
            } catch (e2) {
              id = null;
            }
          }
          if (!id) id = resolveFallbackId();
          return id;
        }
        MetisSheetSync.bootTimerPage(resolvePresetId);
      })();
    </script>
    <script>
      (function () {
        function runTimerPage() {
        window.__METIS_IS_TIMER_PAGE = true;

        function $(id) {
          return document.getElementById(id);
        }

        /** 단일 타이머 루프에서 동일 값이면 DOM 스킵 (불필요 리페인트 방지) */
        var lastUi = {};
        var lastPausedOverlay = null;
        var lastHeartbeatAt = 0;
        /** 엔진·오디오·화면을 한 루프에서 처리 (남은 시간·TOTAL·REG·NEXT BREAK 동시 갱신) */
        var MAIN_TICK_MS = 200;

        function textIf(id, text) {
          var v = String(text);
          if (lastUi[id] === v) return;
          lastUi[id] = v;
          var el = $(id);
          if (el) el.textContent = v;
        }

        function htmlIf(id, html) {
          var v = String(html);
          if (lastUi[id] === v) return;
          lastUi[id] = v;
          var el = $(id);
          if (el) el.innerHTML = v;
        }

        function escapeHtml(str) {
          return String(str)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#39;");
        }

        function formatPrizeAmount(n) {
          var value = Math.max(0, Math.floor(Number(n) || 0));
          return value.toLocaleString("ko-KR");
        }

        function normalizePrizeItems(s) {
          if (!s || !Array.isArray(s.prizeItems)) return [];
          return s.prizeItems
            .map(function (item) {
              if (!item || typeof item !== "object") return null;
              var rank = String(item.rank != null ? item.rank : "").trim().slice(0, 24);
              var amount = Math.max(0, Math.floor(Number(item.amount) || 0));
              if (!rank || !amount) return null;
              return { rank: rank, amount: amount };
            })
            .filter(Boolean);
        }

        function displayPrizeBlockHtml(s) {
          var items = normalizePrizeItems(s);
          if (items.length) {
            return items
              .map(function (item, idx) {
                var topClass = idx < 3 ? " prize-item--top" : "";
                return (
                  '<div class="prize-item' +
                  topClass +
                  '">' +
                  '<span class="prize-rank">' +
                  escapeHtml(item.rank) +
                  "</span>" +
                  '<span class="prize-amount">' +
                  formatPrizeAmount(item.amount) +
                  "</span>" +
                  "</div>"
                );
              })
              .join("");
          }
          var raw =
            s.prizeText != null && String(s.prizeText).length
              ? String(s.prizeText).trim()
              : "";
          if (raw) return escapeHtml(raw).replace(/\n/g, "<br />");
          if (s.guaranteedPrize != null) {
            var n = Math.floor(Number(s.guaranteedPrize) || 0);
            if (n > 0) return formatPrizeAmount(n);
          }
          return "—";
        }

        function displayTotalPrize(s) {
          var raw =
            s.totalPrizeText != null && String(s.totalPrizeText).length
              ? String(s.totalPrizeText).trim()
              : "";
          if (!raw) return "—";
          if (/^\d+$/.test(raw)) return Number(raw).toLocaleString("ko-KR");
          if (/^\d[\d,\s]*$/.test(raw)) {
            var n = Number(raw.replace(/[,\s]/g, ""));
            if (Number.isFinite(n)) return Math.floor(n).toLocaleString("ko-KR");
          }
          return raw;
        }

        var LEFT_CAROUSEL_MS = 5000;
        var leftCarouselIdx = 0;
        var leftCarouselTimer = null;
        var leftCarouselRotating = false;

        function hasPrizePoolContent(s) {
          if (normalizePrizeItems(s).length) return true;
          var raw =
            s.prizeText != null && String(s.prizeText).length
              ? String(s.prizeText).trim()
              : "";
          if (raw) return true;
          if (s.guaranteedPrize != null) {
            var n = Math.floor(Number(s.guaranteedPrize) || 0);
            if (n > 0) return true;
          }
          return false;
        }

        function setLeftCarouselView(view) {
          var carousel = $("left-carousel");
          if (!carousel) return;
          carousel.classList.toggle("is-view-meta", view === "meta");
          carousel.classList.toggle("is-view-prize", view === "prize");
          leftCarouselIdx = view === "prize" ? 1 : 0;
        }

        function stopLeftCarousel() {
          if (leftCarouselTimer) {
            clearInterval(leftCarouselTimer);
            leftCarouselTimer = null;
          }
        }

        function startLeftCarousel() {
          stopLeftCarousel();
          leftCarouselTimer = setInterval(function () {
            setLeftCarouselView(leftCarouselIdx === 0 ? "prize" : "meta");
          }, LEFT_CAROUSEL_MS);
        }

        function syncLeftCarousel(s) {
          var carousel = $("left-carousel");
          if (!carousel) return;
          var shouldRotate = !!s.leftPanelRotate && hasPrizePoolContent(s);
          if (shouldRotate !== leftCarouselRotating) {
            leftCarouselRotating = shouldRotate;
            carousel.classList.toggle("is-rotating", shouldRotate);
            if (!shouldRotate) {
              stopLeftCarousel();
              carousel.classList.remove("is-view-prize");
              carousel.classList.add("is-view-meta");
              leftCarouselIdx = 0;
            } else {
              setLeftCarouselView("meta");
              startLeftCarousel();
            }
          }
        }

        /** 브레이크 타임 랜덤 영상 풀 — ./video/ 상대 경로, ended 시 다음 랜덤으로 무한 반복 */
        var BREAK_VIDEO_POOL = [
          "./video/0103.mp4",
          "./video/0105.mp4",
          "./video/0121.mp4",
          "./video/0207.mp4",
          "./video/0318.mp4",
          "./video/02232.mp4",
        ];

        var lastPlayedBreakVideo = null;
        var breakVideoSessionActive = false;
        var wasBreakUiActive = false;
        var breakLastTimerRun = false;

        function pickRandomBreakVideo(excludeSrc) {
          var ex = excludeSrc ? String(excludeSrc) : "";
          var candidates = BREAK_VIDEO_POOL.filter(function (p) {
            return p !== ex;
          });
          if (candidates.length === 0) candidates = BREAK_VIDEO_POOL.slice();
          return candidates[Math.floor(Math.random() * candidates.length)];
        }

        function onBreakVideoEnded() {
          if (!breakVideoSessionActive) return;
          var vid = $("break-video");
          if (!vid) return;
          var s = MetisTimer.readSyncState();
          if (!s || !s.timer) return;
          var tn = MetisTimer.normalizeTimer(s.timer, s);
          var levels = MetisTimer.getActiveLevels(s);
          var row = levels && levels[tn.levelIndex];
          if (
            !tn.isRunning ||
            tn.bridge ||
            !row ||
            !MetisTimer.isBreakRow(row)
          ) {
            return;
          }
          var exclude = (vid.dataset.metisSrc && String(vid.dataset.metisSrc)) || "";
          var next = pickRandomBreakVideo(exclude);
          lastPlayedBreakVideo = next;
          vid.dataset.metisSrc = next;
          vid.src = next;
          vid.load();
          playBreakVideo(vid);
        }

        function syncBreakUi(onBreak, breakRow, rem, timerRunning) {
          var topBar = $("break-top-bar");
          var vidStage = $("break-video-stage");
          var norm = $("normal-stage-main");
          var vid = $("break-video");
          if (!topBar || !vidStage || !norm || !vid) return;
          if (onBreak && breakRow) {
            topBar.classList.remove("is-hidden");
            vidStage.classList.remove("is-hidden");
            vidStage.setAttribute("aria-hidden", "false");
            norm.classList.add("is-hidden");
            textIf("break-remaining-top", MetisTimer.formatMMSS(rem));

            if (!wasBreakUiActive) {
              breakVideoSessionActive = true;
              var src = pickRandomBreakVideo(lastPlayedBreakVideo);
              lastPlayedBreakVideo = src;
              vid.dataset.metisSrc = src;
              vid.src = src;
              vid.load();
              if (!vid.dataset.metisBreakEndedBound) {
                vid.dataset.metisBreakEndedBound = "1";
                vid.addEventListener("ended", onBreakVideoEnded);
              }
            }

            if (timerRunning) {
              if (!wasBreakUiActive || !breakLastTimerRun) {
                playBreakVideo(vid);
              } else {
                applyBreakVideoAudio(vid);
              }
            } else {
              try {
                vid.pause();
              } catch (e2) {}
            }
            breakLastTimerRun = !!timerRunning;
            wasBreakUiActive = true;
          } else {
            breakVideoSessionActive = false;
            wasBreakUiActive = false;
            breakLastTimerRun = false;
            topBar.classList.add("is-hidden");
            vidStage.classList.add("is-hidden");
            vidStage.setAttribute("aria-hidden", "true");
            norm.classList.remove("is-hidden");
            try {
              vid.pause();
              vid.removeAttribute("src");
              vid.load();
            } catch (e1) {}
            vid.dataset.metisSrc = "";
          }
        }

        function firstPlayLevelRow(levels) {
          if (!levels || !levels.length) return null;
          for (var i = 0; i < levels.length; i++) {
            if (!MetisTimer.isBreakRow(levels[i])) return levels[i];
          }
          return null;
        }

        function playLevelsCountUpTo(levels, idxInclusive) {
          var n = 0;
          for (var j = 0; j <= idxInclusive; j++) {
            if (levels[j] && !MetisTimer.isBreakRow(levels[j])) n++;
          }
          return n;
        }

        function formatCountdownHMS(endMs, now) {
          if (endMs == null || !Number.isFinite(Number(endMs))) return "—";
          var sec = Math.max(0, Math.floor((Number(endMs) - now) / 1000));
          var h = Math.floor(sec / 3600);
          var m = Math.floor((sec % 3600) / 60);
          var secR = sec % 60;
          function p2(n) {
            return String(n).padStart(2, "0");
          }
          var hs = h < 100 ? p2(h) : String(h);
          return hs + ":" + p2(m) + ":" + p2(secR);
        }

        /** 다음 브레이크 행까지: 현재 구간 남은 시간 + 중간 전체 구간(레벨·브레이크) 풀타임 합 */
        function secondsUntilNextBreakRow(levels, levelIndex, remCurrentSec) {
          if (!levels || !levels.length) return null;
          var n = levels.length;
          var i = Math.max(0, Math.min(Math.floor(Number(levelIndex)) || 0, n - 1));
          var b = -1;
          for (var j = i + 1; j < n; j++) {
            if (MetisTimer.isBreakRow(levels[j])) {
              b = j;
              break;
            }
          }
          if (b < 0) return null;
          var total = Math.max(0, Math.floor(Number(remCurrentSec) || 0));
          for (var k = i + 1; k < b; k++) {
            total += MetisTimer.levelDurationSec(levels[k]);
          }
          return total;
        }

        function formatDurationHMS(totalSec) {
          var sec = Math.max(0, Math.floor(Number(totalSec) || 0));
          var h = Math.floor(sec / 3600);
          var m = Math.floor((sec % 3600) / 60);
          var secR = sec % 60;
          function p2(x) {
            return String(x).padStart(2, "0");
          }
          var hs = h < 100 ? p2(h) : String(h);
          return hs + ":" + p2(m) + ":" + p2(secR);
        }

        function formatAvgBbText(avgStack, levelRow) {
          var avgNum = Math.max(0, Math.floor(Number(avgStack) || 0));
          var avgText = avgNum.toLocaleString("ko-KR");
          var bb = levelRow ? Math.floor(Number(levelRow.bb) || 0) : 0;
          if (!bb) {
            return avgText + ' <span class="metric-val-bb">(— BB)</span>';
          }
          var bbRatio = Math.round((avgNum / bb) * 10) / 10;
          return (
            avgText +
            ' <span class="metric-val-bb">(' +
            bbRatio.toFixed(1) +
            " BB)</span>"
          );
        }

        /** 진행 중 레벨·브레이크 모두 누적. bridge(대기 타이머·시작 준비)·일시정지(isRunning false)는 제외 */
        function shouldCountTotalTime(s, tn, levels, currentRow) {
          if (!s || !tn || !tn.isRunning || tn.bridge) return false;
          if (!levels || !levels.length || !currentRow) return false;
          return true;
        }

        /** REG CLOSE·NEXT BREAK는 본 타이머(레벨 진행) 중에만 카운트. 대기·시작 준비 bridge 중에는 정지 */
        function shouldRunScheduleClocks(s, tn) {
          if (!s || !tn) return false;
          if (tn.bridge && (tn.bridge.kind === "preWait" || tn.bridge.kind === "startGo")) {
            return false;
          }
          if (
            s.pendingBridge &&
            (s.pendingBridge.kind === "preWait" || s.pendingBridge.kind === "startGo")
          ) {
            return false;
          }
          return true;
        }

        /** 레벨 임의 이동 시 건너뛴 구간을 토탈에 반영. 시작 전·일시정지 wall time은 제외, 건너뛴 레벨 잔여·중간 구간은 포함 */
        function creditSkippedLevelSeconds(fromIdx, toIdx, levels, remBeforeSkip, started) {
          if (!started || !levels || !levels.length || toIdx <= fromIdx) return;
          var credit = Math.max(0, Math.floor(Number(remBeforeSkip) || 0));
          for (var k = fromIdx + 1; k < toIdx; k++) {
            credit += MetisTimer.levelDurationSec(levels[k]);
          }
          if (credit > 0) {
            totalSeconds += credit;
            totalMsCarry = 0;
          }
        }

        function updateTotalTime(step, tn, levels, currentRow) {
          var now = typeof step.now === "number" ? step.now : Date.now();
          if (totalLastNow == null) totalLastNow = now;

          var isResetState =
            (step.state.timerStatus || "") === "대기중" &&
            !tn.isRunning &&
            !tn.bridge &&
            Number(step.state.totalSeconds || 0) === 0;
          if (isResetState) {
            totalSeconds = 0;
            totalMsCarry = 0;
            totalLastNow = now;
            lastTrackedScheduleIdx = null;
            lastTrackedRem = 0;
            return;
          }

          if (shouldCountTotalTime(step.state, tn, levels, currentRow)) {
            var delta = Math.max(0, now - totalLastNow);
            totalMsCarry += delta;
            if (totalMsCarry >= 1000) {
              var gain = Math.floor(totalMsCarry / 1000);
              totalSeconds += gain;
              totalMsCarry -= gain * 1000;
            }
          } else {
            totalMsCarry = 0;
          }
          totalLastNow = now;
        }

        function getActivePresetFromState(s) {
          if (!s || !s.presets || !s.activePresetId) return null;
          for (var i = 0; i < s.presets.length; i++) {
            if (s.presets[i].id === s.activePresetId) return s.presets[i];
          }
          return null;
        }

        /** 플레이 레벨 번호(브레이크 제외 N번째)에 해당하는 스케줄 행 인덱스 */
        function findNthPlayLevelRowIndex(levels, playLevelN) {
          if (!levels || playLevelN < 1) return null;
          var seen = 0;
          for (var i = 0; i < levels.length; i++) {
            if (!MetisTimer.isBreakRow(levels[i])) {
              seen++;
              if (seen === playLevelN) return i;
            }
          }
          return null;
        }

        /** 스케줄 행 targetIdx 구간이 끝날 때까지 남은 시간(초). 이미 지나면 0 */
        function secondsUntilScheduleRowEnd(levels, scheduleIndex, remSec, targetIdx) {
          if (targetIdx == null || targetIdx < 0) return 0;
          var n = levels.length;
          var i = Math.max(0, Math.min(Math.floor(Number(scheduleIndex)) || 0, n - 1));
          var rem = Math.max(0, Math.floor(Number(remSec) || 0));
          if (i > targetIdx) return 0;
          if (i === targetIdx) return rem;
          var total = rem;
          for (var k = i + 1; k <= targetIdx; k++) {
            total += MetisTimer.levelDurationSec(levels[k]);
          }
          return total;
        }

        /**
         * 레지 마감 N = LEVEL N 블라인드가 시작되기 직전 =
         * 그 직전 스케줄 행(레벨 또는 브레이크)이 끝날 때까지.
         */
        function secondsUntilRegCloseBeforeNthPlayLevel(
          levels,

        function tick() {

        function adjustEntry(delta) {
          console.log("[MetisSync|PUSH|adjustEntry] (timer.html)", { delta: delta });
          mutateSync(function (s) {

        function adjustPlayer(delta) {
          console.log("[MetisSync|PUSH|adjustPlayer] (timer.html)", { delta: delta });
          mutateSync(function (s) {
            var e = Math.max(0, Math.floor(Number(s.entry) || 0));
            var p = Math.max(0, Math.floor(Number(s.player) || 0));

        function handleQuickAction(action) {

          if (action === "vol-plus") return setQuickMasterVolume(getQuickMasterVolume() + 0.1);
          if (action === "vol-minus") return setQuickMasterVolume(getQuickMasterVolume() - 0.1);
          if (action === "entry-plus") return adjustEntry(1);
          if (action === "entry-minus") return adjustEntry(-1);

          if (action === "player-minus") return adjustPlayer(-1);

          if (action === "min-minus") return adjustCurrentRemaining(-60);
          if (action === "sec-plus") return adjustCurrentRemaining(1);
          if (action === "sec-minus") return adjustCurrentRemaining(-1);
          if (action === "start") return quickStart();
          if (action === "pause") return quickPause();
          if (action === "end") return quickEnd();
        }

        function bindAudioUnlockOnce() {
          if (audioUnlockBound || typeof MetisAudio === "undefined") return;
          audioUnlockBound = true;
          function onceUnlock() {
            MetisAudio.unlock();
            if (MetisAudio.resumeCtx) MetisAudio.resumeCtx();
          }
          window.addEventListener("pointerdown", onceUnlock, true);
          window.addEventListener("keydown", onceUnlock, true);
          window.addEventListener("touchstart", onceUnlock, true);
          window.addEventListener("click", onceUnlock, true);
        }
        bindAudioUnlockOnce();
        if (typeof MetisAudio !== "undefined") MetisAudio.unlock();
        loadQuickVolume();
        refreshQuickPanelVisibility();
        window.addEventListener("mousemove", function (e) {
          var bottomBand = 50;
          quickHoverBottom = window.innerHeight - e.clientY <= bottomBand;
          refreshQuickPanelVisibility();
        });
        if (quickPanel) {
          quickPanel.addEventListener("mouseenter", function () {
            quickHoverPanel = true;
            refreshQuickPanelVisibility();
          });
          quickPanel.addEventListener("mouseleave", function () {
            quickHoverPanel = false;
            refreshQuickPanelVisibility();
          });
        }
        if (quickPanel) {
          quickPanel.addEventListener("click", function (e) {
            var t = e.target;
            if (!(t instanceof HTMLButtonElement)) return;
            var action = t.getAttribute("data-quick");
            if (action) handleQuickAction(action);
          });
        }
        tapRoot.addEventListener("click", function () {
          if (typeof MetisAudio !== "undefined") MetisAudio.unlock();
          togglePauseResume();
        });
        tapRoot.addEventListener("keydown", function (e) {
          if (e.key === " " || e.key === "Enter") {
            e.preventDefault();
            if (typeof MetisAudio !== "undefined") MetisAudio.unlock();
            togglePauseResume();
          }
        });

        setInterval(tick, MAIN_TICK_MS);

        MetisTimer.subscribeSync(refreshFromBroadcast);
        window.addEventListener("storage", refreshFromBroadcast);

        if (window.MetisSheetSync && MetisSheetSync.startCloudTimerSync) {
          var pinnedPresetId = MetisTimer.getSyncPresetId
            ? MetisTimer.getSyncPresetId()
            : window.__METIS_TIMER_PRESET_ID || "";
          MetisSheetSync.startCloudTimerSync(
            function (result) {
              var ar =
                result && result.applyResult
                  ? result.applyResult
                  : { leveledUp: false, activePresetChanged: false };
              console.log("[MetisSync|PULL|timer.html:cloudPoll콜백]", {
                applied: result && result.applied,
                presetsApplied: result && result.presetsApplied,
                applyResult: ar,
              });
              refreshFromBroadcast();
              if (ar.leveledUp) {
                suppressSkipCreditOnce = true;
                resetTransitionCues();
                playTransitionDoorong();
                prevLevelSecExact = null;
              }
              tick();
            },
            pinnedPresetId ? { pinnedPresetId: pinnedPresetId } : null
          );
        }
        if (window.MetisSheetSync && MetisSheetSync.bindCloudSyncBadge) {
          MetisSheetSync.bindCloudSyncBadge("cloud-sync-badge");
        }

        function clearHb() {
          try {
            localStorage.removeItem(MetisTimer.HEARTBEAT_KEY);
          } catch (e) {}
        }
        function clearLeftCarousel() {
          stopLeftCarousel();
        }
        window.addEventListener("beforeunload", function () {
          clearHb();
          clearLeftCarousel();
        });
        window.addEventListener("pagehide", function () {
          clearHb();
          clearLeftCarousel();
          if (window.MetisSheetSync && MetisSheetSync.stopCloudTimerSync) {
            MetisSheetSync.stopCloudTimerSync();
          }
        });

        tick();
        }

        if (window.__METIS_TIMER_BOOT_DONE) runTimerPage();
        else window.addEventListener("metis-timer-boot-done", runTimerPage, { once: true });
      })();
    </script>
  </body>
</html>
